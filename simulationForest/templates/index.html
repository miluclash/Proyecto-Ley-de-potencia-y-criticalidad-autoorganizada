<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forest Fire — Drossel–Schwabl</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --accent: #ff4500;
    --accent2: #22c55e;
    --text: #e5e5e5;
    --muted: #555;
    --tree: #22c55e;
    --fire: #ff4500;
    --empty: #0a0a0a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: baseline;
    gap: 1rem;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    letter-spacing: -0.02em;
  }

  header span {
    color: var(--muted);
    font-size: 0.75rem;
  }

  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: calc(100vh - 65px);
  }

  /* SIDEBAR */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 1.5rem;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .section-title {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .field {
    margin-bottom: 0.75rem;
  }

  label {
    display: block;
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 0.3rem;
  }

  input[type="number"], input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    padding: 0.5rem 0.75rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: var(--accent); }

  .btn {
    width: 100%;
    padding: 0.6rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .btn-primary:hover { opacity: 0.85; }

  .btn-secondary {
    background: transparent;
    color: var(--text);
  }

  .btn-secondary:hover {
    background: var(--surface);
    border-color: var(--text);
  }

  .btn-accent2 {
    background: var(--accent2);
    color: #000;
    border-color: var(--accent2);
    font-weight: 700;
  }

  .btn-accent2:hover { opacity: 0.85; }

  .btn-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
  }

  /* STATS */
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.4rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.75rem;
  }

  .stat-row:last-child { border-bottom: none; }

  .stat-label { color: var(--muted); }

  .stat-value { font-weight: 700; }

  .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 6px;
  }

  .dot-tree { background: var(--tree); }
  .dot-fire { background: var(--fire); }
  .dot-empty { background: #444; }

  /* STATUS BAR */
  .status {
    font-size: 0.7rem;
    color: var(--muted);
    padding: 0.5rem 0;
    min-height: 1.5rem;
  }

  .status.ok { color: var(--accent2); }
  .status.err { color: var(--accent); }

  /* CANVAS AREA */
  .canvas-area {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }

  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    max-width: 90%;
    max-height: 90%;
  }

  .canvas-placeholder {
    text-align: center;
    color: var(--muted);
  }

  .canvas-placeholder p { font-size: 0.8rem; margin-top: 0.5rem; }

  /* Auto indicator */
  .auto-indicator {
    position: absolute;
    top: 1rem; right: 1rem;
    background: var(--accent);
    color: white;
    font-size: 0.65rem;
    padding: 0.25rem 0.6rem;
    letter-spacing: 0.1em;
    display: none;
  }

  .auto-indicator.visible { display: block; }
</style>
</head>
<body>

<header>
  <h1>FOREST FIRE</h1>
  <span>Drossel–Schwabl model · Desarrollo Web en Entorno Servidor</span>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- CREAR SIMULACIÓN -->
    <div>
      <p class="section-title">Nueva simulación</p>
      <div class="field">
        <label>Tamaño (20–200)</label>
        <input type="number" id="size" value="80" min="20" max="200">
      </div>
      <div class="field">
        <label>p — crecimiento de árbol</label>
        <input type="number" id="p" value="0.05" min="0" max="1" step="0.001">
      </div>
      <div class="field">
        <label>f — ignición por rayo</label>
        <input type="number" id="f" value="0.001" min="0" max="1" step="0.0001">
      </div>
      <button class="btn btn-primary" onclick="createSimulation()">Crear simulación</button>
      <div id="status-create" class="status"></div>
    </div>

    <hr class="divider">

    <!-- WEATHER -->
    <div>
      <p class="section-title">Parámetros por ciudad</p>
      <div class="field">
        <label>Ciudad</label>
        <input type="text" id="city" placeholder="Madrid, Tokyo...">
      </div>
      <button class="btn btn-secondary" onclick="fetchWeather()">Obtener p y f</button>
      <div id="status-weather" class="status"></div>
    </div>

    <hr class="divider">

    <!-- CONTROLES -->
    <div>
      <p class="section-title">Controles</p>
      <div class="field">
        <label>Pasos por avance</label>
        <input type="number" id="steps" value="1" min="1" max="100">
      </div>
      <div class="btn-group" style="margin-bottom:0.5rem">
        <button class="btn btn-secondary" onclick="stepSimulation()">▶ Paso</button>
        <button class="btn btn-accent2" id="btn-auto" onclick="toggleAuto()">AUTO</button>
      </div>
      <button class="btn btn-secondary" onclick="deleteSimulation()">✕ Eliminar</button>
    </div>

    <hr class="divider">

    <!-- ESTADÍSTICAS -->
    <div>
      <p class="section-title">Estadísticas</p>
      <div class="stat-row">
        <span class="stat-label">Pasos</span>
        <span class="stat-value" id="stat-steps">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label"><span class="dot dot-tree"></span>Árboles</span>
        <span class="stat-value" id="stat-tree">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label"><span class="dot dot-fire"></span>Fuego</span>
        <span class="stat-value" id="stat-fire">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label"><span class="dot dot-empty"></span>Vacío</span>
        <span class="stat-value" id="stat-empty">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">p actual</span>
        <span class="stat-value" id="stat-p">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">f actual</span>
        <span class="stat-value" id="stat-f">—</span>
      </div>
    </div>

  </aside>

  <!-- CANVAS -->
  <main class="canvas-area">
    <div id="placeholder" class="canvas-placeholder">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <rect x="4" y="4" width="40" height="40" stroke="#333" stroke-width="2"/>
        <rect x="12" y="12" width="8" height="8" fill="#22c55e" opacity="0.5"/>
        <rect x="28" y="20" width="8" height="8" fill="#ff4500" opacity="0.5"/>
      </svg>
      <p>Crea una simulación para comenzar</p>
    </div>
    <canvas id="canvas" style="display:none"></canvas>
    <div class="auto-indicator" id="auto-indicator">● AUTO</div>
  </main>
</div>

<script>
  const API = '';  // mismo origen
  let simId = null;
  let autoInterval = null;
  let autoRunning = false;

  // ── CREAR SIMULACIÓN ─────────────────────────────────────────────
  async function createSimulation() {
    const size = parseInt(document.getElementById('size').value);
    const p = parseFloat(document.getElementById('p').value);
    const f = parseFloat(document.getElementById('f').value);
    setStatus('status-create', '');

    const res = await fetch(`${API}/api/simulations/`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken')},
      body: JSON.stringify({size, p, f})
    });

    const data = await res.json();
    if (!res.ok) { setStatus('status-create', data.error || 'Error', true); return; }

    simId = data.data.id;
    setStatus('status-create', `ID: ${simId.slice(0,8)}...`, false, true);
    renderData(data.data);
  }

  // ── AVANZAR PASO ─────────────────────────────────────────────────
  async function stepSimulation() {
    if (!simId) { setStatus('status-create', 'Sin simulación activa', true); return; }
    const steps = parseInt(document.getElementById('steps').value) || 1;

    const res = await fetch(`${API}/api/simulations/${simId}/step/`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken')},
      body: JSON.stringify({steps})
    });

    const data = await res.json();
    if (res.ok) renderData(data);
  }

  // ── AUTO MODE ────────────────────────────────────────────────────
  function toggleAuto() {
    if (autoRunning) {
      clearInterval(autoInterval);
      autoRunning = false;
      document.getElementById('btn-auto').textContent = 'AUTO';
      document.getElementById('btn-auto').className = 'btn btn-accent2';
      document.getElementById('auto-indicator').classList.remove('visible');
    } else {
      autoRunning = true;
      document.getElementById('btn-auto').textContent = '■ STOP';
      document.getElementById('btn-auto').className = 'btn btn-primary';
      document.getElementById('auto-indicator').classList.add('visible');
      autoInterval = setInterval(stepSimulation, 100);
    }
  }

  // ── ELIMINAR ─────────────────────────────────────────────────────
  async function deleteSimulation() {
    if (!simId) return;
    if (autoRunning) toggleAuto();

    await fetch(`${API}/api/simulations/${simId}/`, {
      method: 'DELETE',
      headers: {'X-CSRFToken': getCookie('csrftoken')}
    });

    simId = null;
    document.getElementById('canvas').style.display = 'none';
    document.getElementById('placeholder').style.display = 'flex';
    ['stat-steps','stat-tree','stat-fire','stat-empty','stat-p','stat-f'].forEach(id => {
      document.getElementById(id).textContent = '—';
    });
    setStatus('status-create', 'Simulación eliminada', false, true);
  }

  // ── WEATHER ──────────────────────────────────────────────────────
  async function fetchWeather() {
    const city = document.getElementById('city').value.trim();
    if (!city) { setStatus('status-weather', 'Introduce una ciudad', true); return; }
    setStatus('status-weather', 'Consultando...');

    const res = await fetch(`${API}/api/weather/?city=${encodeURIComponent(city)}`);
    const data = await res.json();

    if (!res.ok) { setStatus('status-weather', data.error || 'Error', true); return; }

    document.getElementById('p').value = data.p.toFixed(4);
    document.getElementById('f').value = data.f.toFixed(4);
    setStatus('status-weather', `p=${data.p.toFixed(4)}, f=${data.f.toFixed(4)}`, false, true);
  }

  // ── RENDER ───────────────────────────────────────────────────────
  function renderData(data) {
    const grid = data.grid;
    const N = grid.length;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const SIZE = Math.min(Math.floor(window.innerWidth * 0.65), window.innerHeight * 0.85);
    const cell = Math.max(1, Math.floor(SIZE / N));
    canvas.width = N * cell;
    canvas.height = N * cell;
    canvas.style.display = 'block';
    document.getElementById('placeholder').style.display = 'none';

    for (let i = 0; i < N; i++) {
      for (let j = 0; j < N; j++) {
        const v = grid[i][j];
        ctx.fillStyle = v === 1 ? '#22c55e' : v === 2 ? '#ff4500' : '#0a0a0a';
        ctx.fillRect(j * cell, i * cell, cell, cell);
      }
    }

    // Stats
    const total = N * N;
    const trees = grid.flat().filter(v => v === 1).length;
    const fire = grid.flat().filter(v => v === 2).length;
    const empty = total - trees - fire;

    document.getElementById('stat-steps').textContent = data.steps;
    document.getElementById('stat-tree').textContent = `${(trees/total*100).toFixed(1)}%`;
    document.getElementById('stat-fire').textContent = `${(fire/total*100).toFixed(1)}%`;
    document.getElementById('stat-empty').textContent = `${(empty/total*100).toFixed(1)}%`;
    document.getElementById('stat-p').textContent = data.p;
    document.getElementById('stat-f').textContent = data.f;
  }

  // ── UTILS ────────────────────────────────────────────────────────
  function setStatus(id, msg, isError=false, isOk=false) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'status' + (isError ? ' err' : isOk ? ' ok' : '');
  }

  function getCookie(name) {
    const v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
    return v ? v[2] : '';
  }
</script>
</body>
</html>
